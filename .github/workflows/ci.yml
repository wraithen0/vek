name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CMAKE_VERSION: "3.16"

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            compiler: gcc
          - os: ubuntu-latest
            arch: x86_64
            compiler: clang
          # macOS x86_64
          - os: macos-latest
            arch: x86_64
            compiler: clang
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            arch: arm64
            compiler: clang
          # Windows x86_64
          - os: windows-latest
            arch: x86_64
            compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc clang

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: |
          cd build
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bin/test_kernels.exe
            ./bin/test_backends.exe
          elif [ "$RUNNER_OS" = "macOS" ]; then
            DYLD_LIBRARY_PATH=./lib ./bin/test_kernels
            DYLD_LIBRARY_PATH=./lib ./bin/test_backends
          else
            LD_LIBRARY_PATH=./lib ./bin/test_kernels
            LD_LIBRARY_PATH=./lib ./bin/test_backends
          fi
        shell: bash

      - name: Run benchmarks
        run: |
          cd build
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bin/bench_kernels.exe 5000
          elif [ "$RUNNER_OS" = "macOS" ]; then
            DYLD_LIBRARY_PATH=./lib ./bin/bench_kernels 5000
          else
            LD_LIBRARY_PATH=./lib ./bin/bench_kernels 5000
          fi
        shell: bash

  # Release job: create release assets on tag push
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          cmake --install build --prefix ./install

      - name: Create tarball
        run: |
          cd install
          tar -czf ../vek-${{ github.ref_name }}-linux-x86_64.tar.gz *
          cd ..
          sha256sum vek-${{ github.ref_name }}-linux-x86_64.tar.gz > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vek-${{ github.ref_name }}-linux-x86_64.tar.gz
            SHA256SUMS.txt