name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CMAKE_VERSION: "3.16"

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            arch: x86_64
            build_type: Release
            cc: gcc
          - os: ubuntu-latest
            arch: x86_64
            build_type: Debug
            cc: gcc
          - os: ubuntu-latest
            arch: x86_64
            build_type: Release
            cc: clang
          # Linux ARM64
          - os: ubuntu-24.04-arm
            arch: arm64
            build_type: Release
            cc: gcc
          # macOS x86_64
          - os: macos-latest
            arch: x86_64
            build_type: Release
            cc: clang
          # macOS ARM64
          - os: macos-14
            arch: arm64
            build_type: Release
            cc: clang
          # Windows x86_64
          - os: windows-latest
            arch: x86_64
            build_type: Release
            cc: msvc
          - os: windows-latest
            arch: x86_64
            build_type: Debug
            cc: msvc
          # Windows ARM64
          - os: windows-latest
            arch: arm64
            build_type: Release
            cc: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Configure (Makefile)
        if: matrix.cc != 'msvc'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Configure (MSVC)
        if: matrix.cc == 'msvc'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -A ${{ matrix.arch == 'x86_64' && 'x64' || 'ARM64' }}

      - name: Build (Makefile)
        if: matrix.cc != 'msvc'
        run: |
          cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Build (MSVC)
        if: matrix.cc == 'msvc'
        run: |
          cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test (Makefile)
        if: matrix.cc != 'msvc'
        run: |
          cd build && ctest --output-on-failure --parallel

      - name: Test (MSVC)
        if: matrix.cc == 'msvc'
        run: |
          cd build && ctest -C ${{ matrix.build_type }} --output-on-failure --parallel

      - name: Upload artifacts (Windows)
        if: matrix.cc == 'msvc' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: vek-windows-${{ matrix.arch }}
          path: build/*.dll
          if-no-files-found: ignore

  benchmark:
    name: Benchmark (Linux x86_64)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run benchmarks
        run: |
          cd build && ./bench_kernels 10000

      - name: Save benchmark results
        run: |
          cd build && ./bench_kernels 10000 > benchmark-results.txt 2>&1 || true

      - name: Upload benchmark
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: build/benchmark-results.txt

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test, benchmark]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate changelog
        run: |
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD > CHANGELOG.md || echo "v0.6.0 - Initial release" > CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: CHANGELOG.md